name: "[TEST] Write Tests"
description: "Write the test file for a module. All tests must fail (red) before the paired [IMPL] issue is opened."
title: "[TEST] "
labels: ["test", "tdd-red"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## TDD Protocol
        This issue produces a **failing test file**. No implementation code.
        Tests must be red before the paired `[IMPL]` issue is created.

        > **Playbook note:** The test file is the acceptance criteria. It is the
        > executable specification of "done." If a behavior isn't tested, it isn't
        > required. Write tests with that weight in mind.

  - type: input
    id: module
    attributes:
      label: Module
      description: "The module under test. Match the file path exactly."
      placeholder: "src/processing/pre_filter.py"
    validations:
      required: true

  - type: input
    id: test_file
    attributes:
      label: Test File to Create
      description: "Where the test file will live."
      placeholder: "tests/unit/test_pre_filter.py"
    validations:
      required: true

  - type: input
    id: spec_ref
    attributes:
      label: Spec Reference
      description: "Section(s) of SPEC.md that define the behavior being tested."
      placeholder: "SPEC.md §3.2 step 6, §3.7 (failure handling)"
    validations:
      required: true

  - type: textarea
    id: pipeline_context
    attributes:
      label: Module Context
      description: "What does this module do? What does it receive and produce? Copy from SPEC.md if applicable."
      placeholder: |
        Stage: Pre-Filter (step 4 of preprocessing)
        Receives: list[ExcerptItem] (after dedup)
        Produces: list[ExcerptItem] (filtered subset)
        Position: between Deduplicator and Summarizer
    validations:
      required: true

  - type: textarea
    id: happy_path
    attributes:
      label: Happy Path Tests
      description: "List each happy path case. One line per test. Be specific about inputs and expected outputs."
      placeholder: |
        - Items where ANY keyword matches title → pass through
        - Items where ANY keyword matches excerpt → pass through
        - Matching is case-insensitive
        - Returns subset of original list, preserving order
        - Returns all items if all match
    validations:
      required: true

  - type: textarea
    id: failure_modes
    attributes:
      label: Failure Mode Tests
      description: "One test per failure mode from SPEC.md that applies to this module. If none apply directly, write N/A and explain."
      placeholder: |
        - Empty input list → returns [] (never raises)
        - No items match any keyword → returns []
        - All items match → returns full list unchanged
        - Single-item list → handled correctly (no off-by-one)
    validations:
      required: true

  - type: textarea
    id: contract_tests
    attributes:
      label: Interface / Contract Tests
      description: "If this module implements a public interface (e.g. a base class or ABC), list the contract tests. Otherwise write N/A."
      placeholder: |
        N/A — PreFilter is an internal processing stage, not a public interface.
    validations:
      required: true

  - type: textarea
    id: fixtures
    attributes:
      label: Fixtures Required
      description: "List any fixture files or conftest.py helpers this test file needs. Note if they already exist or need to be created."
      placeholder: |
        New fixtures needed:
        - tests/fixtures/excerpt_items_mixed.py — factory for list[ExcerptItem] with varied content

        Existing fixtures usable:
        - conftest.py: sample_config (already exists)

        Model validation constraints to note (prevents silent test setup failures):
        - ProfileConfig requires interests: list[str] with ≥ 1 item
        - [list any other required fields / validators for dataclasses used in test helpers]
    validations:
      required: true

  - type: textarea
    id: mocking
    attributes:
      label: Mocking Strategy
      description: "What external dependencies need to be mocked? How?"
      placeholder: |
        None — PreFilter is pure logic (no I/O, no network, no LLM).
        Use real dataclass instances as input.

        ⚠️ Mock depth check: if mocking requires configuring a chain of more than
        3 method calls (e.g. service.a().b().c().execute()), the module under test
        likely needs an internal helper that can be mocked at a higher level.
        Before writing tests, check whether such a helper exists. If not, note it
        here — the [IMPL] issue should add the helper before (or alongside) the
        main implementation. Tests should mock the helper, not the SDK chain.
    validations:
      required: true

  - type: textarea
    id: done_when
    attributes:
      label: Done When
      description: "Acceptance criteria for THIS issue (not the implementation). The test file is done when:"
      value: |
        - [ ] Test file exists at the path specified above
        - [ ] All tests FAIL (red) — confirmed with `pytest <test_file> -v`
        - [ ] Tests collect as **FAIL**, not **ERROR** (create a minimal stub module if needed — see agent instructions below)
        - [ ] Every happy path case has at least one test
        - [ ] Every failure mode has at least one test
        - [ ] Empty input case is covered
        - [ ] `make lint` passes on the test file itself (no syntax errors, typed fixtures)
        - [ ] Test names are descriptive: `test_pre_filter_passes_on_keyword_in_excerpt`
        - [ ] Any spec ambiguities encountered while writing tests are documented as `[DECISION]` issues — not silently resolved in test code
        - [ ] PR description includes an "Interface decisions made" section listing any interpretive calls, even obvious ones
        - [ ] **If this module parses structured LLM output** (headings, JSON fields, delimiters): at least one regression test per marker that imports the parser constant and asserts its verbatim presence in the prompt template — canned responses in tests bypass the template entirely, so template/parser mismatches are otherwise invisible
        - [ ] Paired `[IMPL]` issue is linked below before closing this issue
    validations:
      required: true

  - type: input
    id: impl_issue
    attributes:
      label: Paired [IMPL] Issue
      description: "Link to the paired implementation issue. Create it and add the number here before closing this [TEST] issue (see Done When above)."
      placeholder: "#42"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        **Agent instructions:**
        1. Read `CLAUDE.md` and `SPEC.md` at the sections referenced above before writing any code.
        2. Write the test file only. Do not create or modify any file in the source module directory.
        3. Create a **minimal stub** for the module under test (empty classes/functions with correct signatures but no logic). This allows pytest to collect tests as **FAIL** rather than **ERROR**. Stubs are infrastructure, not implementation — they must not contain any real logic.
        4. Write the first 3–5 tests, then run `make lint` immediately — fix any violations before continuing. Catching lint errors early is much cheaper than fixing them after the full file is written. Common traps in test files: magic values in assertions (extract to named variables); lines over the length limit; unused parameters in stub classes (add `# noqa: ARG002`); inline strings in `raise` statements (assign to `msg` first); use timezone-aware datetime where required.
        5. Finish writing all remaining tests.
        6. Run `pytest <test_file> -v` — confirm all behavioral tests show **FAILED**, not **ERROR**. A test that shows ERROR means pytest couldn't collect it; fix the stub until it shows FAILED.
        7. If any assertion requires an interpretive call not explicitly in the spec (semantics, required vs optional, error types), open a `[DECISION]` issue **before** encoding the choice in test code.
        8. Run `make lint` — confirm the full test file and stub are clean.
        9. Create the paired `[IMPL]` issue and add its number in the field above before closing this issue.
